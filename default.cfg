# Need help configuring? View the Documentation: https://poloniexlendingbot.readthedocs.io/en/latest/configuration.html

[API]
# 交易所选择：Poloniex 或 Bitfinex（我们只用 Bitfinex）
exchange = Bitfinex
# 你的 Bitfinex API Key（只开 Funding 权限）
apikey = YourAPIKey
# 你的 Bitfinex API Secret
secret = YourSecret

[POLONIEX]
# Poloniex 用的币种列表（我们不用 Poloniex，保留无所谓）
all_currencies = STR,BTC,BTS,CLAM,DOGE,DASH,LTC,MAID,XMR,XRP,ETH,FCT,#BTG

[BITFINEX]
# Bitfinex 支持放贷的币种列表（只留你想放的，#开头的会被忽略）
all_currencies = USD,USDT,BTC,ETH,XRP,IOT,XMR,LTC,OMG,ETC,EOS,DSH,ZEC,#BTG

[BOT]
# 网页标题自定义名字，随便写
label = Lending Bot

# 活跃时（有挂单）每轮休息秒数，默认 60 秒最优
sleeptimeactive = 60

# 完全没挂单时每轮休息秒数，默认 300 秒（5 分钟）
sleeptimeinactive = 300

# API 请求超时秒数，默认 30 秒就够
#timeout = 30

# 全局最低日利率（%），低于这个利率就不放贷
mindailyrate = 0.025          # 最低日利率 0.025%（比 FRR 稍高一点点，低于这个就不放，佛系）

# 最高允许的日利率（最高 5%）
maxdailyrate = 5

# 分散挂单笔数（1-20），数值越大越分散，越像 Fuly 的 spread
spreadlend = 3

# 挂单深度模式：Relative（按自己余额百分比）、RawBTC（按 BTC 量）、Raw（按币种原始数量）
gapMode = Raw
# 跳过借贷簿前面多少金额的 dust（单位：美元等值）
gapbottom = 50000
# 最高挂到借贷簿前面多少金额的位置
gaptop = 200000

# 当日利率 ≥ 这个值时，改为更长期限放贷（0 表示永远 2 天）
xdaythreshold = 0.05
# 高利率时锁定的最长天数（Bitfinex 最大 120 天）
xdays = 120
# 线性递增天数（可选，打开会更平滑）
#xdayspread = 2

# 自动把 Exchange 钱包的钱转到 Funding 钱包
# ALL = 全部币种，ACTIVE = 当前已放贷的币种，也可以手动写
#transferableCurrencies = USD,BTC,BCH,ETH,XRP,IOT,XMR,LTC,OMG,ETC,EOS,DSH,ZEC
transferableCurrencies = ALL

# 每笔最小放贷金额（单位：币种本身，例如 USD 就是美元）
minloansize = 150

# 部分成交后剩余太少是否保留原单（True 推荐）
keepstuckorders = True

# 利率低于 mindailyrate 时是否完全隐藏不放（True 推荐）
hideCoins = True

# 到指定日期前把所有贷款收回（不想用就保持注释）
#endDate = 2026,1,1

# 利率低于 maxtolendrate 时最多只放固定数量（留空=不限制）
#maxtolend = 0

# 利率低于 maxtolendrate 时最多只放百分之多少（0-100，留空=100%）
#maxpercenttolend = 0

# 触发上面两个限制的利率阈值（留空=永远生效）
#maxtolendrate = 0

# 是否把 Bitfinex 的 Flash Return Rate 当成最低利率（强烈建议 True）
frrasmin = True

# 在 FRR 基础上再加多少（例如 0.00015 = FRR + 0.015%），超级重要！
frrdelta = 0.00015

# 开启 JSON 日志（网页仪表盘必须）
jsonfile = www/botlog.json

# JSON 日志最多保留行数（太大浏览器会卡）
jsonlogsize = 200

# 开启内置网页服务器（强烈建议打开）
startWebServer = true

# 网页服务器地址（0.0.0.0 = 外网可访问，127.0.0.1 = 只本机）
customWebServerAddress = 0.0.0.0

# 网页端口（默认 8000，改成 8080 也可以）
customWebServerPort = 8000

# 网页模板文件夹（保持默认）
customWebServerTemplate = www

# 网页里收益统计显示的货币（USD 最直观）
outputCurrency = USD

# 开启插件：AccountStats（每日收益统计） + Charts（历史曲线）
plugins = AccountStats,Charts

[ACCOUNTSTATS]
# 每天统计一次（86400 秒 = 24 小时）
ReportInterval = 86400

[CHARTS]
# 每 6 小时更新一次历史图表
DumpInterval = 21600
# 图表数据保存位置
HistoryFile = www/history.json

# ====================== 通知相关（不想收就全 False） ======================
[notifications]
notify_new_loans = False          # 新放贷成功通知
notify_tx_coins = False           # 自动转账通知
notify_xday_threshold = False     # 高利率锁长期通知
notify_summary_minutes = 0        # 每 X 分钟发一次总结（0=关闭）
notify_caught_exception = False   # 异常通知

# Email / Slack / Telegram / Pushbullet / IRC 全都可以开，随你喜欢
email = False
email_login_address = me@gmail.com
email_login_password = secretPassword
email_smtp_server = smtp.gmail.com
email_smtp_port = 465
email_smtp_starttls = False
email_to_addresses = me@gmail.com,you@gmail.com

slack = False
slack_token = 1234567890abcdef
slack_channels = #cryptocurrency,@someUser
slack_username = Poloniex Bot

telegram = False
telegram_bot_id = 1234567890abcdef
telegram_chat_ids = @polopolo,@cryptocurrency

pushbullet = False
pushbullet_token = 1234567890abcdef
pushbullet_deviceid = 1234567890abcdef

irc = False
irc_host = irc.freenode.net
irc_port = 6667
irc_nick = LendingBot
irc_ident = ledningbot
irc_realname = Poloniex lending bot
irc_target = #bitbotfactory

#[MarketAnalysis]
# PLEASE refer to the docs before attempting to use any of this. There are a lot of things here that will not work
# correctly unless you understand what you are doing.
analyseCurrencies = STR,BTC,BTS,CLAM,DOGE,DASH,LTC,MAID,XMR,XRP,ETH,FCT
lendingStyle = 75
MACD_long_win_seconds = 1800
#MACD_short_win_seconds = 150
# 3 days = 60 * 60 * 24 * 3 = 259200
percentile_seconds = 259200
# keep_history_seconds > (greater of (percentile_seconds, MACD_long_win_seconds) * 1.1)
#keep_history_seconds = 285120
#recorded_levels = 10
# 15 %  means we need one data point every 9 seconds. You probably don't need to change this.
#data_tolerance = 15
#delete_thread_sleep = 60
#ma_debug_log = False

[Daily_min]
# This defaults to percentile, MACD is the moving average calc and should give better rates
method = MACD
multiplier = 1.2
